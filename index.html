<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MarcoList</title>

<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#111827">
</head>

<body>

<div id="loginScreen" class="screen active">

<h1>MarcoList</h1>

<div class="card">

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Entra</button>

<p id="loginError"></p>

</div>
</div>

<div id="appScreen" class="screen">

<header>

<h2>MarcoList</h2>

<button id="themeToggle">🌙</button>

</header>

<section class="card">

<input id="taskText" placeholder="Nuova attività">

<select id="taskType">
<option value="free">Libera</option>
<option value="scheduled">Pianificata</option>
</select>

<input type="date" id="taskDate">
<input type="time" id="taskTime">

<button id="addTaskBtn">Aggiungi</button>

</section>

<section class="filters">

<button data-filter="all">Tutte</button>
<button data-filter="todo">Da fare</button>
<button data-filter="done">Completate</button>
<button data-filter="scheduled">Pianificate</button>
<button data-filter="today">Oggi</button>

</section>

<section class="card">

<h3>Calendario</h3>

<div id="calendar"></div>

</section>

<section class="card">

<h3>Attività</h3>

<ul id="taskList"></ul>

</section>

</div>

<script src="app.js"></script>

</body>
</html>
